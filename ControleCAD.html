<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
      .modal { transition: opacity 0.25s ease; }
      body.modal-active { overflow-x: hidden; overflow-y: visible !important; }
      #modalAlerta { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
      .custom-scroll::-webkit-scrollbar { width: 6px; }
      .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
      .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
  </head>
  <body class="bg-slate-50 font-sans min-h-screen">

    <nav class="bg-[#1e293b] p-4 shadow-xl border-b border-blue-500/30">
      <div class="container mx-auto flex justify-between items-center">
        <h1 class="text-white font-black text-xl tracking-tighter flex items-center">
          <i class="fas fa-cube mr-3 text-blue-400"></i>CAD/CAM <span class="ml-2 font-light text-slate-400 hidden md:inline">| Dashboard</span>
        </h1>
        <button onclick="toggleModalPesquisa()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-xl transition-all shadow-lg shadow-blue-900/20 flex items-center font-bold active:scale-95">
          <i class="fas fa-search mr-2"></i> PESQUISAR
        </button>
      </div>
    </nav>

    <main class="container mx-auto p-6">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 flex items-center">
          <div class="p-4 bg-emerald-50 rounded-2xl text-emerald-600">
            <i class="fas fa-chart-line fa-2xl"></i>
          </div>
          <div class="ml-5">
            <p class="text-xs text-slate-400 uppercase font-black tracking-widest">Total Produzido</p>
            <div class="flex items-baseline">
              <p id="total-unid" class="text-4xl font-black text-slate-800">...</p>
              <span class="ml-2 text-slate-400 font-bold text-sm">UNID</span>
            </div>
          </div>
        </div>

        <div onclick="toggleModalNovo()" class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 flex items-center cursor-pointer hover:bg-emerald-50 hover:border-emerald-200 transition-all group active:scale-95">
          <div class="p-4 bg-emerald-50 rounded-2xl text-emerald-600 group-hover:bg-emerald-600 group-hover:text-white transition-colors">
            <i class="fas fa-plus-circle fa-2xl"></i>
          </div>
          <div class="ml-5">
            <p class="text-xs text-slate-400 uppercase font-black tracking-widest">Operação</p>
            <p class="text-xl font-bold text-slate-800">Novo Procedimento</p>
          </div>
        </div>

        <div onclick="imprimirRelatorio()" class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 flex items-center cursor-pointer hover:bg-blue-50 hover:border-blue-200 transition-all group active:scale-95">
          <div class="p-4 bg-blue-50 rounded-2xl text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-colors">
            <i class="fas fa-print fa-2xl"></i>
          </div>
          <div class="ml-5">
            <p class="text-xs text-slate-400 uppercase font-black tracking-widest">Relatório</p>
            <p class="text-xl font-bold text-slate-800">Imprimir Resumo</p>
          </div>
        </div>

      </div>
    </main>

    <div id="modalPesquisa" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-40 p-4">
      <div class="absolute w-full h-full bg-slate-900/80 backdrop-blur-sm" onclick="toggleModalPesquisa()"></div>
      <div class="bg-white w-full max-w-5xl rounded-3xl shadow-2xl z-50 overflow-hidden">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
          <h2 class="text-2xl font-black text-slate-800 tracking-tight">Buscador Global</h2>
          <button onclick="toggleModalPesquisa()" class="text-slate-400 hover:text-red-500">
            <i class="fas fa-times-circle fa-xl"></i>
          </button>
        </div>
        <div class="p-8">
          <div class="flex gap-4 mb-8">
            <input type="text" id="inputNome" placeholder="Nome do paciente..." class="flex-1 px-4 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 outline-none font-medium">
            <button onclick="buscar()" class="bg-[#1e293b] text-white px-10 py-4 rounded-2xl font-black hover:bg-black active:scale-95">BUSCAR</button>
          </div>
          <div class="overflow-x-auto border border-slate-100 rounded-2xl custom-scroll max-h-[400px]">
            <table class="min-w-full divide-y divide-slate-100">
              <thead class="bg-slate-50/80">
                <tr>
                  <th class="px-6 py-4 text-left text-xs font-black text-slate-400 uppercase">Paciente</th>
                  <th class="px-6 py-4 text-left text-xs font-black text-slate-400 uppercase">Material</th>
                  <th class="px-6 py-4 text-center text-xs font-black text-slate-400 uppercase">Unid</th>
                  <th class="px-6 py-4 text-center text-xs font-black text-slate-400 uppercase">Dente</th> 
                  <th class="px-6 py-4 text-center text-xs font-black text-slate-400 uppercase">Cor</th>
                </tr>
              </thead>
              <tbody id="tabela-resultados" class="bg-white divide-y divide-slate-50"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div id="modalNovo" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-40 p-4">
      <div class="absolute w-full h-full bg-slate-900/80 backdrop-blur-sm" onclick="toggleModalNovo()"></div>
      <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl z-50 overflow-hidden transform transition-all">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
          <h2 class="text-2xl font-black text-slate-800 tracking-tight">Novo Procedimento</h2>
          <button onclick="toggleModalNovo()" class="text-slate-400 hover:text-red-500">
            <i class="fas fa-times-circle fa-xl"></i>
          </button>
        </div>
        <form id="formProcedimento" class="p-6 space-y-3">
          <div class="grid grid-cols-2 gap-3">
            <div class="col-span-2">
              <label class="block text-xs font-black text-slate-400 uppercase">Paciente *</label>
              <input type="text" id="novoPaciente" required class="w-full px-3 py-2 bg-slate-50 border-2 border-slate-100 rounded-lg focus:border-blue-500 outline-none">
            </div>
            <div>
              <label class="block text-xs font-black text-slate-400 uppercase">Material</label>
              <input type="text" id="novoMaterial" class="w-full px-3 py-2 bg-slate-50 border-2 border-slate-100 rounded-lg focus:border-blue-500 outline-none">
            </div>
            <div>
              <label class="block text-xs font-black text-slate-400 uppercase">Data * (DD/MM/AA)</label>
              <input type="text" id="novoData" placeholder="24/04/26" required class="w-full px-3 py-2 bg-slate-50 border-2 border-slate-100 rounded-lg focus:border-blue-500 outline-none">
            </div>
            <div>
              <label class="block text-xs font-black text-slate-400 uppercase">Qtd</label>
              <input type="number" id="novoQtd" value="1" class="w-full px-3 py-2 bg-slate-50 border-2 border-slate-100 rounded-lg focus:border-blue-500 outline-none">
            </div>
            <div>
              <label class="block text-xs font-black text-slate-400 uppercase">Unid</label>
              <input type="number" id="novoUnid" value="1" class="w-full px-3 py-2 bg-slate-50 border-2 border-slate-100 rounded-lg focus:border-blue-500 outline-none">
            </div>
            <div>
              <label class="block text-xs font-black text-slate-400 uppercase">Cadista</label>
              <input type="text" id="novoCadista" class="w-full px-3 py-2 bg-slate-50 border-2 border-slate-100 rounded-lg focus:border-blue-500 outline-none">
            </div>
            <div>
              <label class="block text-xs font-black text-slate-400 uppercase">Doutor</label>
              <input type="text" id="novoDoutor" class="w-full px-3 py-2 bg-slate-50 border-2 border-slate-100 rounded-lg focus:border-blue-500 outline-none">
            </div>
            <div>
              <label class="block text-xs font-black text-slate-400 uppercase">Dente</label>
              <input type="number" id="novoDente" class="w-full px-3 py-2 bg-slate-50 border-2 border-slate-100 rounded-lg focus:border-blue-500 outline-none">
            </div>
            <div>
              <label class="block text-xs font-black text-slate-400 uppercase">Cor</label>
              <input type="text" id="novoCor" class="w-full px-3 py-2 bg-slate-50 border-2 border-slate-100 rounded-lg focus:border-blue-500 outline-none">
            </div>
          </div>
          <button type="button" id="btnSalvar" onclick="salvarProcedimento()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black hover:bg-blue-700 transition-all mt-4">
            SALVAR PROCEDIMENTO
          </button>
        </form>
      </div>
    </div>

    <div id="modalAlerta" class="fixed inset-0 z-[100] flex items-center justify-center hidden p-4">
      <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onclick="fecharAlerta()"></div>
      <div id="alertaConteudo" class="bg-white rounded-[2rem] shadow-2xl z-[110] max-w-sm w-full p-8 transform transition-all border border-slate-100 text-center">
        <div id="alertaIcone" class="mx-auto flex items-center justify-center h-20 w-20 rounded-full mb-6"></div>
        <h3 id="alertaTitulo" class="text-2xl font-black text-slate-800"></h3>
        <p id="alertaMensagem" class="text-slate-500 mt-4 font-medium"></p>
        <button onclick="fecharAlerta()" class="mt-10 w-full bg-[#1e293b] text-white py-4 rounded-2xl font-black active:scale-95">OK</button>
      </div>
    </div>

    <script>
      // Controle de Interface dos Modais
      function toggleModalPesquisa() {
        const modal = document.getElementById('modalPesquisa');
        modal.classList.toggle('opacity-0');
        modal.classList.toggle('pointer-events-auto');
        document.body.classList.toggle('modal-active');
      }

      function toggleModalNovo() {
        const modal = document.getElementById('modalNovo');
        modal.classList.toggle('opacity-0');
        modal.classList.toggle('pointer-events-auto');
        document.body.classList.toggle('modal-active');
      }

      function mostrarAlerta(titulo, mensagem, tipo = 'sucesso') {
        const modal = document.getElementById('modalAlerta');
        const conteudo = document.getElementById('alertaConteudo');
        const icone = document.getElementById('alertaIcone');
        
        if (tipo === 'erro') {
          icone.innerHTML = '<i class="fas fa-times fa-2xl"></i>';
          icone.className = "mx-auto flex items-center justify-center h-20 w-20 rounded-full mb-6 bg-red-50 text-red-500";
        } else {
          icone.innerHTML = '<i class="fas fa-check fa-2xl"></i>';
          icone.className = "mx-auto flex items-center justify-center h-20 w-20 rounded-full mb-6 bg-emerald-50 text-emerald-500";
        }

        document.getElementById('alertaTitulo').innerText = titulo;
        document.getElementById('alertaMensagem').innerText = mensagem;
        modal.classList.remove('hidden');
        setTimeout(() => conteudo.classList.add('scale-100', 'opacity-100'), 50);
      }

      function fecharAlerta() {
        document.getElementById('modalAlerta').classList.add('hidden');
      }

      // Inicialização da Página
      window.onload = () => {
        google.script.run.withSuccessHandler(total => {
          document.getElementById('total-unid').innerText = total;
        }).getResSummaryDashboard || google.script.run.withSuccessHandler(total => {
          document.getElementById('total-unid').innerText = total;
        }).getResumoDashboard();
      };

      // Comunicação Assíncrona com Back-end
      function salvarProcedimento() {
        const btn = document.getElementById('btnSalvar');
        const dados = {
          paciente: document.getElementById('novoPaciente').value,
          material: document.getElementById('novoMaterial').value,
          qtd: document.getElementById('novoQtd').value,
          data: document.getElementById('novoData').value,
          cadista: document.getElementById('novoCadista').value,
          doutor: document.getElementById('novoDoutor').value,
          unid: document.getElementById('novoUnid').value,
          dente: document.getElementById('novoDente').value,
          cor: document.getElementById('novoCor').value
        };

        if(!dados.paciente || !dados.data) {
          return mostrarAlerta("Erro", "Paciente e Data são campos obrigatórios", "erro");
        }

        btn.disabled = true;
        btn.innerText = "SALVANDO...";

        google.script.run.withSuccessHandler((res) => {
          if(res === true) {
            document.getElementById('formProcedimento').reset();
            toggleModalNovo();
            mostrarAlerta("Sucesso", "Procedimento registrado com sucesso!");
            
            google.script.run.withSuccessHandler(t => {
              document.getElementById('total-unid').innerText = t;
            }).getResumoDashboard();
          } else {
            mostrarAlerta("Erro", res, "erro");
          }
          btn.disabled = false;
          btn.innerText = "SALVAR PROCEDIMENTO";
        }).salvarNovoProcedimento(dados);
      }

      function buscar() {
        const nome = document.getElementById('inputNome').value;
        const tabela = document.getElementById('tabela-resultados');

        if(!nome.trim()) return;
        tabela.innerHTML = "<tr><td colspan='5' class='text-center p-4 text-slate-500'>Buscando registros...</td></tr>";

        google.script.run.withSuccessHandler(function(rows) {
          tabela.innerHTML = "";
          
          if (!rows || rows.length === 0) {
            tabela.innerHTML = "<tr><td colspan='5' class='text-center p-4 text-red-500 font-bold'>NENHUM DADO ENCONTRADO</td></tr>";
            return;
          }

          rows.forEach(linha => {
            const tr = document.createElement('tr');
            tr.className = "hover:bg-slate-50 transition-colors border-b border-slate-100";
            tr.innerHTML = `
              <td class="px-6 py-4 text-sm font-medium text-slate-700">${linha[0] || ""}</td> 
              <td class="px-6 py-4 text-sm text-slate-600">${linha[1] || "-"}</td>
              <td class="px-6 py-4 text-sm font-bold text-blue-600 text-center">${linha[6] || "0"}</td>
              <td class="px-6 py-4 text-sm text-slate-600 text-center font-bold">${linha[7] || "-"}</td> 
              <td class="px-6 py-4 text-sm text-slate-500 text-center uppercase font-semibold">${linha[8] || "-"}</td>
            `;
            tabela.appendChild(tr);
          });
        }).buscarPacienteGlobal(nome);
      }

      function imprimirRelatorio() {
        google.script.run.withSuccessHandler(function(dados) {
          if (!dados || dados.length === 0) return mostrarAlerta("Erro", "Sem dados disponíveis para gerar relatório.", "erro");
          
          const win = window.open('', '', 'width=900,height=700');
          let linhasHtml = '';
          let somaTotal = 0;

          dados.forEach(item => {
            let dt = item.data instanceof Date ? item.data.toLocaleDateString('pt-BR') : item.data;
            let unid = parseFloat(item.unidades) || 0;
            somaTotal += unid;
            linhasHtml += `<tr><td>${item.paciente}</td><td>${dt || '-'}</td><td>${item.material}</td><td align="center">${unid}</td></tr>`;
          });

          win.document.write(`
            <!DOCTYPE html>
            <html>
            <head>
              <title>Relatório de Produção</title>
              <style>
                body { font-family: sans-serif; padding: 30px; color: #334155; }
                table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: left; font-size: 13px; }
                th { background: #f8fafc; font-weight: bold; color: #1e293b; }
                h2 { font-size: 22px; margin-bottom: 5px; color: #0f172a; }
                .footer { margin-top: 30px; font-weight: 800; font-size: 18px; text-align: right; border-top: 2px solid #334155; padding-top: 10px; }
              </style>
            </head>
            <body>
              <h2>Resumo de Produção - CAD/CAM</h2>
              <p style="font-size: 12px; color: #64748b;">Relatório gerado automaticamente pelo sistema controlador</p>
              <table>
                <thead>
                  <tr><th>Paciente</th><th>Data</th><th>Material</th><th>Unidades</th></tr>
                </thead>
                <tbody>${linhasHtml}</tbody>
              </table>
              <div class="footer">TOTAL CONSOLIDADO: ${somaTotal} UNIDADES</div>
            </body>
            </html>
          `);
          win.document.close();
          setTimeout(() => { win.print(); win.close(); }, 500);
        }).getDadosParaRelatorio();
      }
    </script>
  </body>
</html>
